---
- name: Deploy daoistic
  hosts: 127.0.0.1
  connection: local
  become: false
  gather_facts: false
  vars:

      web_repo: https://github.com/tessercat/daoistic-web.git
      web_version: master
      web_port: 8200

      book_repo: https://github.com/tessercat/daoistic-book.git
      book_version: master

  roles:
      - {role: web, tags: [web]}
